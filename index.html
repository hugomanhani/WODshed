<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Garage WOD</title>
<meta name="description" content="Garage gym workout generator with progressive overload tracking.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garage WOD">
<style>html,body{margin:0; background:#0d1b2a;}</style>
</head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

  :root{
    --bg:#0d1b2a;
    --surface:#1b263b;
    --surface-2:#0d1b2a;
    --coral:#ff6b6b;
    --coral-dark:#e5504f;
    --muted:#778da9;
    --text:#e0e1dd;
    --line:rgba(255,255,255,0.2);
    --line-strong:rgba(255,255,255,0.3);
    --danger:#ff6b6b;
    --font-display:'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono:'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html, body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text);
    margin:0;
  }
  #gw-root{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    padding:0 0 calc(108px + env(safe-area-inset-bottom, 0px));
    min-height:100vh;
    min-height:100dvh;
    border-radius:14px;
    position:relative;
    overflow:hidden;
  }
  .gw-display{
    font-family:var(--font-display);
    font-weight:900;
    letter-spacing:-0.01em;
    text-transform:uppercase;
  }
  #gw-header{
    background:var(--surface);
    padding:calc(20px + env(safe-area-inset-top, 0px)) 24px 24px;
  }
  #gw-header .gw-rule{display:none;}
  #gw-header h1{ margin:0; font-size:44px; letter-spacing:-0.02em; line-height:0.85; color:#fff; }
  #gw-header h1 span{color:var(--coral);}
  #gw-header .gw-sub{color:var(--coral); opacity:0.8; font-size:11px; margin-top:8px; letter-spacing:0.1em; font-weight:700; font-family:var(--font-body); text-transform:uppercase;}

  .gw-btn{
    background:var(--surface); color:#fff; border:1px solid var(--line-strong);
    padding:10px 16px; border-radius:8px; cursor:pointer; font-size:12px;
    font-weight:800; letter-spacing:0.03em; text-transform:uppercase; font-family:var(--font-body);
  }
  .gw-btn:hover{background:#232f47;}
  .gw-btn.gw-primary{background:var(--coral); color:var(--bg); border:none; font-family:var(--font-display); font-size:16px; letter-spacing:0;}
  .gw-btn.gw-primary:hover{background:var(--coral-dark);}
  .gw-btn.gw-teal{background:var(--coral); color:var(--bg); border:none; font-family:var(--font-display); font-size:16px; letter-spacing:0;}
  .gw-btn.gw-teal:hover{background:var(--coral-dark);}
  .gw-btn:disabled{opacity:0.35; cursor:not-allowed;}
  .gw-btn-row{display:flex; gap:8px; flex-wrap:wrap;}

  #gw-controls{
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:var(--surface); border-radius:8px;
    padding:16px; margin-bottom:20px; font-size:12px;
  }
  #gw-controls.gw-travel-on{background:var(--coral);}
  #gw-controls.gw-travel-on span, #gw-controls.gw-travel-on label{color:var(--bg) !important;}
  .gw-switch-row{display:flex; align-items:center; gap:8px;}
  .gw-switch{position:relative; width:44px; height:24px; flex:none;}
  .gw-switch input{opacity:0; width:0; height:0;}
  .gw-slider{position:absolute; inset:0; background:var(--surface-2); border-radius:24px; cursor:pointer; transition:0.2s; border:1px solid var(--line);}
  .gw-slider:before{content:""; position:absolute; width:18px; height:18px; left:2px; top:2px; background:var(--muted); border-radius:50%; transition:0.2s;}
  .gw-switch input:checked + .gw-slider{background:var(--bg); border-color:var(--bg);}
  .gw-switch input:checked + .gw-slider:before{transform:translateX(20px); background:var(--coral);}
  #gw-controls label.gw-time{display:flex; align-items:center; gap:10px; font-weight:700; flex-wrap:wrap;}
  .gw-time-stepper{
    display:flex; align-items:stretch; border:1px solid var(--line-strong); border-radius:8px; overflow:hidden;
    background:var(--surface-2);
  }
  .gw-time-step-btn{
    width:38px; height:38px; flex:none; background:var(--surface-2); border:none; color:var(--coral);
    font-size:20px; font-weight:900; font-family:var(--font-body); cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .gw-time-step-btn:hover{background:var(--surface);}
  .gw-time-step-btn:active{background:var(--coral); color:var(--bg);}
  #gw-controls input[type=number]{
    width:56px; height:38px; background:var(--surface-2); border:none; border-left:1px solid var(--line); border-right:1px solid var(--line);
    color:#fff; padding:0 4px; font-size:16px; font-weight:800; font-family:var(--font-body); text-align:center;
    -moz-appearance:textfield;
  }
  #gw-controls input[type=number]::-webkit-outer-spin-button,
  #gw-controls input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
  }
  .gw-time-clear-btn{
    background:none; border:1px solid var(--line); color:var(--muted); border-radius:8px;
    padding:8px 12px; font-size:12px; font-weight:800; font-family:var(--font-body); cursor:pointer;
  }
  .gw-time-clear-btn:hover{color:var(--coral); border-color:var(--coral);}

  /* ---- bottom floating nav ---- */
  #gw-pagetabs{
    display:flex; gap:4px; justify-content:space-between;
    position:fixed; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom, 0px));
    width:calc(100% - 40px); max-width:361px; z-index:100;
    background:rgba(13,27,42,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line); border-radius:24px; padding:13px 20px;
    box-shadow:0 12px 24px rgba(0,0,0,0.45);
  }
  .gw-pagetab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; color:var(--muted);
  }
  .gw-pagetab svg{width:22px; height:22px; stroke:var(--muted); fill:none; stroke-width:1.8;}
  .gw-pagetab .gw-navlabel{
    font-family:var(--font-body); font-weight:800; font-size:11px; letter-spacing:0.02em;
  }
  .gw-pagetab .gw-navdot{display:none;}
  .gw-pagetab.active{color:var(--coral);}
  .gw-pagetab.active svg{stroke:var(--coral);}
  .gw-page{padding:20px; padding-top:20px; min-height:70vh; min-height:70dvh; box-sizing:border-box;}

  /* ---- LOG day strip ---- */
  #gw-daystrip{display:flex; gap:6px; margin-bottom:20px;}
  .gw-daystrip-cell{
    flex:1; text-align:center; padding:10px 2px; border-radius:12px;
    background:var(--surface); cursor:pointer; position:relative;
  }
  .gw-daystrip-cell:hover{background:#232f47;}
  .gw-daystrip-cell.today{box-shadow:inset 0 0 0 1px var(--coral);}
  .gw-daystrip-cell.selected{background:var(--coral);}
  .gw-daystrip-cell.selected .gw-daystrip-dow,
  .gw-daystrip-cell.selected .gw-daystrip-num{color:var(--bg);}
  .gw-daystrip-dow{font-size:10px; letter-spacing:0.04em; color:var(--muted); text-transform:uppercase; font-weight:800;}
  .gw-daystrip-num{font-size:18px; font-weight:900; color:#fff; margin-top:4px; font-family:var(--font-body);}
  .gw-daystrip-dot{width:4px; height:4px; border-radius:50%; background:var(--coral); margin:5px auto 0;}
  .gw-daystrip-cell.selected .gw-daystrip-dot{background:var(--bg);}

  #gw-focusline{font-size:12px; color:var(--muted); margin-bottom:12px; line-height:1.5; font-weight:700;}
  #gw-focusline strong{color:var(--coral); font-weight:900;}

  /* ---- focus filter tags ---- */
  #gw-daytabs{display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px;}
  .gw-tab{
    padding:10px 12px; border-radius:8px; border:1px solid var(--line-strong);
    background:var(--surface); color:#fff; cursor:pointer;
    font-size:11px; font-weight:900; letter-spacing:0.02em; text-transform:uppercase;
    font-family:var(--font-body); position:relative;
  }
  .gw-tab.active{background:var(--coral); border-color:var(--coral); color:var(--bg);}

  #gw-timebanner{
    font-size:12px; color:#fff; background:var(--surface); border:1px solid var(--line);
    border-radius:8px; padding:12px 14px; margin-bottom:14px; display:none; font-weight:600;
  }
  #gw-coachnotes{
    font-size:12.5px; color:#fff; background:var(--surface); border-left:3px solid var(--coral);
    border-radius:8px; padding:12px 14px; margin-bottom:14px; display:none; line-height:1.55;
  }
  #gw-coachnotes strong{color:var(--coral);}

  /* ---- workout board / cards ---- */
  #gw-board{ display:flex; flex-direction:column; gap:20px; margin-bottom:20px; }
  .gw-section{ border-radius:16px; overflow:hidden; }
  .gw-section-head{
    background:#fff; padding:8px 16px; height:56px; box-sizing:border-box;
    display:flex; justify-content:space-between; align-items:center;
  }
  .gw-section-head .gw-section-title{
    font-family:var(--font-display); font-weight:900; font-size:20px; color:var(--bg); text-transform:none; letter-spacing:0;
  }
  .gw-section-head .gw-tag{
    color:var(--bg); font-size:10px; font-weight:900; letter-spacing:0.04em;
    background:var(--coral); padding:4px 10px; border-radius:999px; text-transform:uppercase;
    border:1px solid rgba(255,255,255,0.3);
  }
  .gw-reroll-btn{
    display:flex; align-items:center; gap:8px; border:1px solid var(--coral); background:none;
    color:var(--bg); border-radius:999px; padding:8px 12px; cursor:pointer;
    font-family:var(--font-body); font-weight:900; font-size:11px; letter-spacing:0.02em;
  }
  .gw-reroll-btn:hover{background:rgba(255,107,107,0.1);}
  .gw-reroll-btn .gw-arrows{font-weight:700; font-size:12px;}
  .gw-timer-inline-btn{
    background:none; color:var(--bg); border:1px solid var(--coral); border-radius:999px;
    font-size:11px; font-weight:900; letter-spacing:0.02em; padding:8px 14px; cursor:pointer;
    text-transform:uppercase; font-family:var(--font-body);
  }
  .gw-timer-inline-btn:hover{background:rgba(255,107,107,0.1);}
  .gw-timer-full{
    display:block; width:100%; text-align:center; border-radius:8px; padding:20px; box-sizing:border-box;
    font-family:var(--font-display); font-size:24px; font-weight:900; text-transform:none;
    background:none; border:1px solid var(--coral); color:var(--coral); cursor:pointer;
  }
  .gw-timer-full:hover{background:rgba(255,107,107,0.08);}
  .gw-icon-btn{
    background:none; color:var(--bg); border:1px solid rgba(13,27,42,0.3); border-radius:50%;
    font-size:13px; width:36px; height:36px; line-height:1; cursor:pointer; padding:0;
    display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .gw-icon-btn:hover{border-color:var(--coral); color:var(--coral);}

  .gw-section-body{padding:20px; background:var(--surface); display:flex; flex-direction:column; gap:20px;}
  .gw-section-headline{font-family:var(--font-display); font-weight:900; font-size:28px; color:var(--coral); line-height:1.05; text-transform:uppercase; word-break:break-word;}
  .gw-headline-row{display:flex; flex-direction:column; align-items:flex-start; gap:6px;}
  .gw-headline-row .gw-tag{flex-shrink:0;}
  .gw-section-detail{font-family:var(--font-body); font-weight:500; font-size:14px; color:var(--text); line-height:1.7; white-space:pre-line;}
  .gw-movement-list{display:flex; flex-direction:column; gap:8px;}
  .gw-movement-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-family:var(--font-body); font-weight:500; font-size:14px; color:var(--text);
  }
  .gw-info-links{display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-family:var(--font-body); font-weight:700; font-size:11px; color:var(--muted);}
  .gw-info-links .gw-info-label{font-weight:900;}
  .gw-info-links a, .gw-info-links span.gw-info-link{color:var(--muted); text-decoration:underline; cursor:pointer;}
  .gw-info-links span.gw-info-link:hover{color:#fff;}

  #gw-empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  #gw-empty .gw-btn{margin-top:14px;}
  .gw-load-row{ display:flex; flex-direction:column; gap:8px; }
  .gw-load-row label{font-size:11px; color:var(--muted); letter-spacing:0.04em; font-weight:900; text-transform:uppercase; font-family:var(--font-body);}
  .gw-load-row input{
    width:100%; background:var(--surface-2); border:1px solid var(--line-strong); color:#fff;
    border-radius:8px; padding:10px 8px; font-size:18px; font-weight:900; text-align:center; font-family:var(--font-body);
  }
  .gw-plates{font-size:12px; color:#fff; font-weight:700;}
  .gw-chips{display:none;} /* replaced by gw-info-links */

  #gw-actions{display:flex; flex-direction:column; gap:12px; margin-bottom:20px;}
  #gw-actions .gw-btn-row{width:100%;}
  #gw-actions > .gw-btn:not(.gw-primary):not(.gw-teal){width:100%; display:flex; align-items:center; justify-content:center; gap:10px; border:1px solid var(--coral); color:var(--coral); background:none; padding:20px; font-family:var(--font-display); font-size:20px; font-weight:900;}
  #gw-actions > .gw-btn:not(.gw-primary):not(.gw-teal):hover{background:rgba(255,107,107,0.08);}
  .gw-btn-with-icon{display:inline-flex; align-items:center; gap:8px;}
  .gw-btn-with-icon svg{flex-shrink:0;}
  #gw-actions > .gw-btn-with-icon svg{width:22px; height:22px;}
  .gw-icon-btn svg{width:16px; height:16px; display:block;}
  #gw-actions .gw-btn.gw-primary, #gw-actions .gw-btn.gw-teal{width:100%; padding:20px;}
  .gw-rate-block{background:var(--surface); border:1px solid var(--line-strong); border-radius:8px; padding:16px; width:100%;}
  .gw-rate-block .gw-rate-label{font-size:11px; font-weight:900; color:#fff; letter-spacing:0.02em; text-transform:uppercase; margin-bottom:12px; font-family:var(--font-body);}
  .gw-rate-options{display:flex; gap:8px;}
  .gw-rate-options .gw-btn{
    flex:1; background:var(--surface-2); border:1px solid var(--line); color:var(--muted);
    border-radius:4px; text-align:center; padding:8px; font-size:12px;
  }
  .gw-rate-options .gw-btn.gw-primary{background:var(--surface-2); border-color:var(--coral); color:var(--coral);}
  #gw-log-content, #gw-profile-content{
    background:transparent; padding:0; margin-bottom:20px;
  }
  #gw-log-content h3, #gw-profile-content h3{margin:0 0 12px; font-size:13px; letter-spacing:0.08em; color:var(--muted); font-weight:900; text-transform:uppercase; font-family:var(--font-body);}
  .gw-card{background:var(--surface); border-radius:16px; padding:20px; margin-bottom:20px;}
  .gw-setting-row{display:flex; flex-direction:column; gap:8px; margin-bottom:16px;}
  .gw-setting-row label, .gw-setting-row > span:first-child{font-size:11px; color:var(--muted); font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-family:var(--font-body);}
  .gw-setting-row input, .gw-setting-row select, .gw-setting-row textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:#fff;
    border-radius:8px; padding:12px 16px; font-size:16px; font-weight:500; font-family:var(--font-body);
  }
  .gw-weights-row{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line);}
  .gw-weights-row:last-child{border-bottom:none;}
  .gw-weights-row .gw-weights-label{font-size:13px; font-weight:600; color:#fff;}
  .gw-weights-row input{
    width:64px; height:36px; background:var(--surface-2); border:1px solid var(--line); color:var(--coral);
    border-radius:6px; text-align:center; font-size:16px; font-weight:800; font-family:var(--font-body);
  }
  .gw-activity-select{
    background:var(--surface-2); border:1px solid var(--line); color:#fff; border-radius:8px; padding:12px 16px; font-size:16px; width:100%; font-family:var(--font-body);
  }
  .gw-activity-notes{
    width:100%; min-height:56px; background:var(--surface-2); border:1px solid var(--line); color:#fff;
    border-radius:8px; padding:12px 16px; font-size:16px; font-family:var(--font-body); resize:vertical;
  }
  .gw-hist-item{background:var(--surface); border-radius:16px; padding:16px; margin-bottom:8px; font-size:13px;}
  .gw-hist-item .gw-hist-date{color:var(--coral); font-weight:900; font-size:13px;}
  .gw-hist-item .gw-hist-detail{color:var(--muted); margin-top:6px; font-weight:400;}
  .gw-gloss-item{padding:10px 0; border-bottom:1px solid var(--line);}
  .gw-gloss-item .gw-gloss-name{font-weight:900; font-size:13px; color:var(--coral);}
  .gw-gloss-item .gw-gloss-desc{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .gw-gloss-item .gw-gloss-link{font-size:12px; color:#fff; font-weight:700; text-decoration:underline; display:inline-block; margin-top:4px;}
  #gw-toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:#fff; color:var(--bg); padding:10px 20px; border-radius:24px;
    font-size:13px; font-weight:800; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:150;
    font-family:var(--font-body);
  }
  #gw-toast.show{opacity:1;}
  #gw-modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(13,27,42,0.8); z-index:160;
    align-items:center; justify-content:center; padding:20px;
  }
  #gw-modal-backdrop.show{display:flex;}
  #gw-modal{
    background:var(--surface); border-radius:16px;
    max-width:360px; width:100%; padding:24px;
  }
  #gw-modal h4{margin:0 0 10px; color:var(--coral); font-size:22px; font-family:var(--font-display); font-weight:900; text-transform:uppercase;}
  #gw-modal p{margin:0; font-size:14px; line-height:1.6; color:var(--text); font-family:var(--font-body);}
  #gw-modal-link{margin-top:12px; display:none; font-family:var(--font-body);}
  #gw-modal-link a{color:#fff; font-size:13px; font-weight:700; text-decoration:underline; font-family:var(--font-body);}
  #gw-modal-link .gw-modal-credit{display:block; font-size:11px; color:var(--muted); margin-top:2px; font-family:var(--font-body);}
  #gw-modal button{margin-top:16px; width:100%;}

  #gw-timer-backdrop{
    display:none; position:fixed; inset:0; background:rgba(13,27,42,0.85); z-index:170;
    align-items:center; justify-content:center; padding:20px;
  }
  #gw-timer-backdrop.show{display:flex;}
  #gw-timer{
    background:var(--surface); border-radius:16px;
    max-width:345px; width:100%; padding:32px; text-align:left;
  }
  #gw-timer .gw-timer-label{font-size:11px; letter-spacing:0.04em; color:var(--muted); text-transform:uppercase; font-weight:900; font-family:var(--font-body);}
  #gw-timer .gw-timer-sub{font-size:14px; color:var(--coral); margin-top:12px; min-height:17px; font-weight:600; font-family:var(--font-body);}
  #gw-timer .gw-timer-phase{
    display:none; font-size:48px; font-weight:900; font-family:var(--font-display); text-transform:uppercase;
    margin-top:16px; line-height:1;
  }
  #gw-timer .gw-timer-phase.show{display:block;}
  #gw-timer .gw-timer-phase.work{color:var(--coral);}
  #gw-timer .gw-timer-phase.rest{color:#fff;}
  #gw-timer .gw-timer-clock{
    font-family:var(--font-mono); font-size:64px; font-weight:700;
    color:#fff; margin:16px 0 0; letter-spacing:0; text-align:left;
  }
  #gw-timer .gw-timer-clock.gw-warn{color:var(--danger);}
  #gw-timer .gw-timer-controls{display:flex; gap:12px; margin-top:24px;}
  #gw-timer .gw-timer-controls .gw-btn{flex:1; border-radius:8px; padding:20px; font-family:var(--font-display); font-size:20px;}
  #gw-timer .gw-timer-controls .gw-btn:not(.gw-primary){background:var(--surface-2); border:1px solid var(--line); color:#fff; flex:none; width:100px;}

];
const BENCHMARK_RETEST_DAYS = 21;

function eligibleBenchmarks(bw){
  return BENCHMARKS.filter(b => !bw || b.equip==='none');
}
// picks the most-overdue eligible benchmark if one is due for a retest, else null
function dueBenchmark(){
  const candidates = eligibleBenchmarks(state.bodyweightOnly);
  let best = null, bestDays = -1;
  candidates.forEach(b=>{
    const hist = (state.benchmarks[b.name] && state.benchmarks[b.name].history) || [];
    const last = hist.length ? hist[hist.length-1].date : null;
    const days = last===null ? Infinity : daysSince(last);
    if(days >= BENCHMARK_RETEST_DAYS && days > bestDays){ bestDays = days; best = b; }
  });
  return best;
}
function computeBenchmarkScore(benchmark, perf){
  if(!perf) return null;
  if(benchmark.scoreType==='rounds'){
    if(perf.rounds==null) return null;
    return perf.rounds*(benchmark.repsPerRound||0) + (perf.extraReps||0);
  }
  if(benchmark.scoreType==='time'){
    if(!perf.time) return null;
    const parts = perf.time.split(':').map(Number);
    if(parts.length!==2 || parts.some(isNaN)) return null;
    return parts[0]*60 + parts[1];
  }
  return null;
}
function fmtBenchmarkScore(benchmark, score){
  if(score==null) return '—';
  if(benchmark.scoreType==='rounds') return `${score} reps`;
  return fmtClock(score);
}

function findKnownMovements(text){
  const found = [];
  const lower = text.toLowerCase();
  Object.keys(EXERCISE_INFO).forEach(name=>{
    if(lower.includes(name.toLowerCase()) && !found.includes(name)) found.push(name);
  });
  return found;
}

// ---------- selection helpers (favor whatever hasn't been used in the longest time, per focus) ----------
function sessionsAgoUsed(type, value, fieldGetter){
  const typeHistory = state.history.filter(h=>h.type===type);
  for(let i=typeHistory.length-1;i>=0;i--){
    const field = fieldGetter(typeHistory[i]);
    const match = Array.isArray(field) ? field.includes(value) : field===value;
    if(match) return typeHistory.length-1-i;
  }
  return Infinity;
}
function pickLRU(pool, type, fieldGetter){
  let bestScore = -1, best = [];
  pool.forEach(candidate=>{
    const score = sessionsAgoUsed(type, candidate, fieldGetter);
    if(score > bestScore){ bestScore = score; best = [candidate]; }
    else if(score === bestScore){ best.push(candidate); }
  });
  return best[Math.floor(Math.random()*best.length)];
}
function pickMovementsLRU(pool, type, n){
  const scored = pool.map(m=>{
    const score = sessionsAgoUsed(type, m.name, h=>h.movementNames||[]);
    return {m, score: (score===Infinity ? 999 : score) + Math.random()*0.75};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0, Math.min(n, pool.length)).map(s=>s.m);
}
function buildWodText(format, wodMovements){
  return `${format}\n` + wodMovements.map(m => `- ${m.reps} ${m.name}`).join('\n');
}
function repsFor(movement, formatStr, multiplier=1){
  let [lo, hi] = movement.range;
  lo = lo*multiplier; hi = hi*multiplier;
  if(/^EMOM/.test(formatStr)){ hi = lo + (hi-lo)*0.5; } // EMOM = smaller per-minute chunks
  const steps = Math.max(1, Math.round((hi-lo)/movement.step));
  let count = lo + Math.floor(Math.random()*(steps+1))*movement.step;
  count = Math.round(count/movement.step)*movement.step;
  return Math.max(movement.step, count);
}
function platesForSide(sideTarget){
  let remaining = sideTarget, used = [];
  for(const p of SIDE_PLATES){ if(p <= remaining){ used.push(p); remaining -= p; } }
  return {used, remaining};
}
function plateBreakdown(totalWeight){
  const sideTarget = Math.max(0, (totalWeight - 45) / 2);
  const {used, remaining} = platesForSide(sideTarget);
  const actualTotal = 45 + used.reduce((a,b)=>a+b,0)*2;
  let text = used.length ? used.join('+') + ' lb per side' : 'bar only (45 lb)';
  text += `  →  ${actualTotal} lb total`;
  if(remaining >= 5) text += ` (closest with your plates; ${remaining.toFixed(0)} lb/side short of exact target)`;
  return text;
}
function applyTimeCap(formatStr, minutes){
  if(/^(AMRAP|EMOM)/.test(formatStr)) return formatStr.replace(/\d+/, minutes);
  if(/FOR TIME/.test(formatStr)) return formatStr.replace(/cap \d+/, 'cap '+minutes);
  return formatStr + ` (time cap ${minutes}')`;
}
// splits available minutes across warmup/skill/wod/core; trims skill/core first when time is tight
function allocateTime(total){
  if(!total) return null;
  total = Math.max(10, Math.round(total));
  let warmup, skill, core;
  if(total <= 15){ warmup=3; skill=0; core=0; }
  else if(total <= 25){ warmup=5; skill=5; core=0; }
  else if(total <= 40){ warmup=5; skill=10; core=5; }
  else { warmup=6; skill=12; core=6; }
  const wod = Math.max(6, total - warmup - skill - core);
  return {warmup, skill, core, wod, skipSkill: skill===0, skipCore: core===0};
}

// ---------- logging activities done outside the app ----------
const ACTIVITY_PRESETS = ['BJJ / Grappling', 'Running', 'Cycling', 'Swimming', 'Walking / Hiking', 'Yoga / Mobility', 'Other'];
// which of our 5 focuses each external activity counts toward, for recency/recovery purposes (null = doesn't count as training load)
const ACTIVITY_FOCUS_MAP = {
  'BJJ / Grappling': 'conditioning',
  'Running': 'conditioning',
  'Cycling': 'conditioning',
  'Swimming': 'conditioning',
  'Walking / Hiking': null,
  'Yoga / Mobility': null,
  'Other': null
};

function daysSince(ts){ return (Date.now() - ts) / (1000*60*60*24); }
function lastSessionDate(type){
  let last = null;
  state.history.forEach(h=>{
    const t = h.kind==='external' ? h.mappedType : h.type;
    if(t===type && (last===null || h.date>last)) last = h.date;
  });
  return last;
}
// if it's been a while since this focus was last trained, ease back in rather than jumping straight to the progressed weight/volume
function layoffFactor(type){
  const last = lastSessionDate(type);
  if(last===null) return {factor:1, days:null, isReturning:false};
  const days = daysSince(last);
  if(days > 14) return {factor:0.9, days:Math.round(days), isReturning:true};
  return {factor:1, days:Math.round(days), isReturning:false};
}
// if a hard external activity mapped to this focus happened very recently, ease off today rather than stacking fatigue
function recentExternalLoadFactor(type){
  const recent = [...state.history].reverse().find(h => h.kind==='external' && h.mappedType===type && daysSince(h.date) < 1.5);
  if(recent && recent.intensity==='hard') return {factor:0.9, activity:recent.activity};
  return {factor:1, activity:null};
}
// picks the best focus for today: whatever's gone longest without training, avoiding an immediate repeat of last time
function recommendedFocus(){
  if(state.history.length===0) return {type: DAY_TYPES[0].key, days:null};
  const lastGenerated = [...state.history].reverse().find(h=>h.kind!=='external');
  const lastType = lastGenerated ? lastGenerated.type : null;
  const scored = DAY_TYPES.map(dt=>{
    const last = lastSessionDate(dt.key);
    const days = last===null ? Infinity : daysSince(last);
    return {key:dt.key, days};
  });
  const candidates = scored.filter(s=>s.key!==lastType);
  const pool = candidates.length ? candidates : scored;
  pool.sort((a,b)=>b.days-a.days);
  return {type: pool[0].key, days: pool[0].days===Infinity ? null : Math.round(pool[0].days)};
}

function computeSuggestedLoad(liftKey){
  const entries = state.history.filter(h=>h.liftKey===liftKey && h.loggedLoad != null);
  if(entries.length===0) return {load: state.weights[liftKey], deload:false};
  const last = entries[entries.length-1];
  const prevLoad = last.loggedLoad;
  const prevRpe = last.rpe || 'right';
  if(entries.length>=2){
    const secondLast = entries[entries.length-2];
    if(prevRpe==='hard' && secondLast.rpe==='hard') return {load: Math.round((prevLoad*0.9)/5)*5, deload:true};
  }
  const adj = (ADJUST[liftKey] && ADJUST[liftKey][prevRpe] != null) ? ADJUST[liftKey][prevRpe] : 5;
  return {load: Math.round((prevLoad+adj)/5)*5, deload:false};
}

function generateWorkout(type){
  state.currentType = type;
  const bw = state.bodyweightOnly;
  const alloc = allocateTime(state.timeAvailable);
  const layoff = layoffFactor(type);
  const external = recentExternalLoadFactor(type);
  const coachNotes = [];

  const warmupPool = bw && WARMUPS_BW[type] ? WARMUPS_BW[type] : WARMUPS[type];
  const warmup = pickLRU(warmupPool, type, h=>h.warmup);

  let skillTplText = null, skillLiftKey = null, suggestedLoad = null, deload = false;
  if(!(alloc && alloc.skipSkill)){
    const skillPool = bw ? SKILLS_BW[type] : SKILLS[type];
    skillTplText = pickLRU(skillPool.map(s=>s.text), type, h=>h.skillTplText);
    const skillTpl = skillPool.find(s=>s.text===skillTplText);
    skillLiftKey = (!bw && skillTpl.liftKey) ? skillTpl.liftKey : null;
    if(skillLiftKey){
      const result = computeSuggestedLoad(skillLiftKey);
      suggestedLoad = result.load; deload = result.deload;
      if(deload) coachNotes.push(`${LIFT_LABELS[skillLiftKey]}: last two sessions rated Hard — backing off ~10% today.`);
      if(layoff.isReturning){
        suggestedLoad = Math.round((suggestedLoad*layoff.factor)/5)*5;
        coachNotes.push(`It's been ${layoff.days} days since your last ${DAY_TYPES.find(d=>d.key===type).label} session — easing the load back ~10% today.`);
      }
      if(external.activity){
        suggestedLoad = Math.round((suggestedLoad*external.factor)/5)*5;
        coachNotes.push(`You logged a hard ${external.activity} session recently — easing the load back ~10% today.`);
      }
    }
  }

  const baseVolume = state.volume[type];
  const effectiveVolume = clamp(baseVolume * layoff.factor * external.factor, 0.5, 1.4);
  if(Math.abs(baseVolume - 1.0) >= 0.09){
    const pct = Math.round((baseVolume-1)*100);
    coachNotes.push(`${DAY_TYPES.find(d=>d.key===type).label} volume ${pct>0?'up':'down'} ${Math.abs(pct)}% based on how recent sessions felt.`);
  }
  if(layoff.isReturning && !skillLiftKey){
    coachNotes.push(`It's been ${layoff.days} days since your last ${DAY_TYPES.find(d=>d.key===type).label} session — dialing back volume ~10% today.`);
  }
  if(external.activity && !skillLiftKey){
    coachNotes.push(`You logged a hard ${external.activity} session recently — dialing back volume ~10% today.`);
  }

  let movementPool = MOVEMENT_LIB[type];
  if(bw) movementPool = movementPool.filter(m=>m.equip==='none');
  let format = pickLRU(FORMATS[type], type, h=>h.format);
  if(alloc) format = applyTimeCap(format, alloc.wod);
  let wodMovements = pickMovementsLRU(movementPool, type, 3).map(m => ({ name: m.name, reps: repsFor(m, format, effectiveVolume) }));
  let isBenchmark = false, benchmarkName = null;

  if(type==='conditioning' && (!alloc || alloc.wod >= 15)){
    const benchmark = dueBenchmark();
    if(benchmark){
      isBenchmark = true;
      benchmarkName = benchmark.name;
      format = benchmark.format;
      wodMovements = benchmark.movements.map(m => ({ name: m.name, reps: m.reps }));
      const hist = (state.benchmarks[benchmark.name] && state.benchmarks[benchmark.name].history) || [];
      if(hist.length){
        const best = benchmark.scoreType==='rounds'
          ? Math.max(...hist.map(h=>h.score))
          : Math.min(...hist.map(h=>h.score));
        coachNotes.push(`Benchmark retest: ${benchmark.name}. Your best so far is ${fmtBenchmarkScore(benchmark, best)} — let's see where you're at now.`);
      } else {
        coachNotes.push(`Benchmark: ${benchmark.name}. This is your first time testing it — whatever you get today becomes the baseline to beat.`);
      }
    }
  }

  let core = null;
  if(!(alloc && alloc.skipCore)) core = pickLRU(CORE, type, h=>h.core);

  state.currentWorkout = {
    type, warmup, skillTplText, skillLiftKey, suggestedLoad, deload,
    format, wodMovements, movements: wodMovements.map(m=>m.name), core, rpe: null, wodRpe: null, bw,
    volumeUsed: effectiveVolume, coachNotes, isBenchmark, benchmarkName,
    sectionsDone: {warmup:true, skill:true, core:true}, wodPerformance: {}
  };
  renderTimeBanner(alloc);
  render();
}

function renderTimeBanner(alloc){
  const banner = document.getElementById('gw-timebanner');
  if(!alloc){ banner.style.display='none'; return; }
  const parts = [`~${alloc.warmup}' warm-up`];
  parts.push(alloc.skipSkill ? 'skill skipped (time)' : `~${alloc.skill}' skill`);
  parts.push(`${alloc.wod}' WOD`);
  parts.push(alloc.skipCore ? 'core skipped (time)' : `~${alloc.core}' core`);
  banner.textContent = `Fitting today into ${state.timeAvailable}': ${parts.join(' · ')}`;
  banner.style.display = 'block';
}

function renderCoachNotes(notes){
  const box = document.getElementById('gw-coachnotes');
  if(!notes || notes.length===0){ box.style.display='none'; return; }
  box.innerHTML = '<strong>Coach notes:</strong> ' + notes.join(' ');
  box.style.display = 'block';
}

function formatPerformance(perf){
  if(!perf) return '';
  if(perf.rounds != null) return `scored ${perf.rounds} rd${perf.rounds===1?'':'s'}${perf.extraReps ? ' + '+perf.extraReps+' reps' : ''}`;
  if(perf.time) return `finished in ${perf.time}${perf.hitCap ? ' (hit cap)' : ''}`;
  if(perf.completedAll != null) return perf.completedAll ? 'completed all rounds' : 'missed some rounds';
  return '';
}

function fmtDate(d){ return new Date(d).toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'}); }

function render(){
  const rec = recommendedFocus();
  const focusLine = document.getElementById('gw-focusline');
  const recLabel = DAY_TYPES.find(d=>d.key===rec.type).label;
  focusLine.innerHTML = state.currentType===rec.type
    ? `Today's recommended focus: <strong>${recLabel}</strong>${rec.days!=null ? ` (last trained ${rec.days}d ago)` : ' (first session)'}`
    : `Recommended focus today is <strong>${recLabel}</strong> — showing ${DAY_TYPES.find(d=>d.key===state.currentType).label} instead.`;

  const tabs = document.getElementById('gw-daytabs');
  tabs.innerHTML = '';
  DAY_TYPES.forEach(dt=>{
    const b = document.createElement('div');
    b.className = 'gw-tab' + (state.currentType===dt.key ? ' active' : '');
    b.textContent = dt.label + (rec && rec.type===dt.key ? ' •' : '');
    b.title = rec && rec.type===dt.key
      ? (rec.days===null ? "Recommended — you haven't trained this focus yet" : `Recommended today — last trained ${rec.days} day${rec.days===1?'':'s'} ago`)
      : '';
    b.onclick = ()=>{ generateWorkout(dt.key); };
    tabs.appendChild(b);
  });

  const board = document.getElementById('gw-board');
  const actions = document.getElementById('gw-actions');
  const w = state.currentWorkout;

  if(!w){
    const rec = recommendedFocus();
    board.innerHTML = `<div id="gw-empty">
      <div class="gw-display" style="font-size:15px; color:var(--muted);">READY FOR THE NEXT ONE</div>
      <div style="font-size:13px; color:var(--muted); margin-top:6px;">Recommended focus: ${DAY_TYPES.find(d=>d.key===rec.type).label}. Tap below, or pick a different focus above.</div>
    </div>`;
    document.getElementById('gw-empty').appendChild(mkBtn('Generate Workout', 'gw-primary', ()=>generateWorkout(rec.type)));
    actions.innerHTML = '';
    renderCoachNotes(null);
    return;
  }

  board.innerHTML = '';
  renderCoachNotes(w.coachNotes);
  if(w.warmup){
    const warmupNode = sectionWithChips('Warm-Up', w.warmup, DAY_TYPES.find(d=>d.key===w.type).label, {
      onReroll: ()=>rerollSection('warmup'), onRemove: ()=>removeSection('warmup')
    });
    warmupNode.finalize();
    board.appendChild(warmupNode);
  }

  if(w.skillTplText){
    const skillNode = sectionWithChips('Skill', w.skillTplText, w.deload ? 'DELOAD' : (w.bw ? 'TRAVEL' : ''), {
      onReroll: ()=>rerollSection('skill'), onRemove: ()=>removeSection('skill')
    });
    if(w.skillLiftKey){
      const row = document.createElement('div');
      row.className = 'gw-load-row';
      row.innerHTML = `<label>${LIFT_LABELS[w.skillLiftKey]} load (lb)</label>`;
      const input = document.createElement('input');
      input.type = 'number'; input.step = '5'; input.value = w.suggestedLoad;
      input.oninput = ()=>{ w.suggestedLoad = Number(input.value)||0; plates.textContent = plateBreakdown(w.suggestedLoad); };
      row.appendChild(input);
      const plates = document.createElement('div');
      plates.className = 'gw-plates';
      plates.textContent = plateBreakdown(w.suggestedLoad);
      row.appendChild(plates);
      skillNode.bodyEl.appendChild(row);
      if(w.deload){
        const note = document.createElement('div');
        note.className = 'gw-plates'; note.style.color = 'var(--danger)';
        note.textContent = 'Last two sessions on this lift were rated Hard — suggested weight backs off ~10%.';
        skillNode.bodyEl.appendChild(note);
      }
    }
    skillNode.finalize();
    board.appendChild(skillNode);
  }

  board.appendChild(renderWodSection(w));
  if(w.core){
    const coreNode = sectionWithChips('Extra Core', w.core, '', {
      onReroll: ()=>rerollSection('core'), onRemove: ()=>removeSection('core')
    });
    coreNode.finalize();
    board.appendChild(coreNode);
  }

  actions.innerHTML = '';
  actions.appendChild(mkBtn('Refresh Workout', 'gw-btn', ()=>generateWorkout(w.type), ICON_REFRESH));

  function buildRateBlock(labelText, currentVal, onPick){
    const block = document.createElement('div');
    block.className = 'gw-rate-block';
    const lbl = document.createElement('div');
    lbl.className = 'gw-rate-label';
    lbl.textContent = labelText;
    block.appendChild(lbl);
    const optsRow = document.createElement('div');
    optsRow.className = 'gw-rate-options';
    ['easy','right','hard'].forEach(r=>{
      const b = mkBtn(RPE_LABELS[r], currentVal===r ? 'gw-primary' : 'gw-btn', ()=>onPick(r));
      optsRow.appendChild(b);
    });
    block.appendChild(optsRow);
    return block;
  }

  if(w.skillLiftKey){
    actions.appendChild(buildRateBlock(
      'How did ' + LIFT_LABELS[w.skillLiftKey] + ' feel?',
      w.rpe, (r)=>{ w.rpe = r; render(); }
    ));
  }
  actions.appendChild(buildRateBlock('How did the WOD feel?', w.wodRpe, (r)=>{ w.wodRpe = r; render(); }));

  const logBtn = mkBtn('Log & Save to History', 'gw-teal', ()=>logWorkout());
  const missingRating = (w.skillLiftKey && !w.rpe) || !w.wodRpe;
  logBtn.disabled = missingRating;
  actions.appendChild(logBtn);
  if(missingRating){
    const hint = document.createElement('div');
    hint.style.cssText = 'width:100%; font-size:11.5px; color:var(--muted); text-align:center; font-weight:700;';
    hint.textContent = w.skillLiftKey && !w.rpe && !w.wodRpe
      ? "Rate the lift and the WOD above to save this session."
      : (w.skillLiftKey && !w.rpe ? "Rate the lift above to save this session." : "Rate the WOD above to save this session.");
    actions.appendChild(hint);
  }
}

function splitHeadline(body){
  const lines = body.split('\n');
  const first = (lines[0] || '').trim();
  const rest = lines.slice(1).join('\n');
  const repeatMatch = first.match(/^(\d+)\s*X:?$/i);
  if(repeatMatch) return {headline: 'REPEAT ' + repeatMatch[1] + 'X', detail: rest};
  return {headline: first.replace(/:$/,''), detail: rest};
}

      link.onclick = ()=>showModal(name, EXERCISE_INFO[name].desc, EXERCISE_INFO[name].url);

}

  opts = opts || {};

  wrap.className = 'gw-section';

  const titleWrap = document.createElement('span');

  head.appendChild(titleWrap);

  const rightWrap = document.createElement('span');
  rightWrap.style.cssText = 'display:flex; align-items:center; gap:8px; flex-shrink:0;';
  if(opts.onReroll){
    const rBtn = document.createElement('button');

    rBtn.innerHTML = ICON_REFRESH;
    rBtn.title = 'Swap this section';

function rerollSection(section){
  const w = state.currentWorkout;
  if(!w) return;
  const bw = w.bw;
  if(section==='warmup'){
    const pool = bw && WARMUPS_BW[w.type] ? WARMUPS_BW[w.type] : WARMUPS[w.type];
    let choice = w.warmup;
    if(pool.length>1){ do{ choice = pool[Math.floor(Math.random()*pool.length)]; } while(choice===w.warmup); }
    w.warmup = choice;
  } else if(section==='skill'){
    const skillPool = bw ? SKILLS_BW[w.type] : SKILLS[w.type];
    let choiceTpl = skillPool.find(s=>s.text===w.skillTplText) || skillPool[0];
    if(skillPool.length>1){ do{ choiceTpl = skillPool[Math.floor(Math.random()*skillPool.length)]; } while(choiceTpl.text===w.skillTplText); }
    w.skillTplText = choiceTpl.text;
    w.skillLiftKey = (!bw && choiceTpl.liftKey) ? choiceTpl.liftKey : null;
    if(w.skillLiftKey){
      const result = computeSuggestedLoad(w.skillLiftKey);
      w.suggestedLoad = result.load; w.deload = result.deload;
    } else { w.suggestedLoad = null; w.deload = false; }
    w.rpe = null;
  } else if(section==='wod'){
    let movementPool = MOVEMENT_LIB[w.type];
    if(bw) movementPool = movementPool.filter(m=>m.equip==='none');
    const formatPool = FORMATS[w.type];
    let newFormat = formatPool[Math.floor(Math.random()*formatPool.length)];
    const alloc = allocateTime(state.timeAvailable);
    if(alloc) newFormat = applyTimeCap(newFormat, alloc.wod);
    const defs = pickMovementsLRU(movementPool, w.type, 3);
    w.format = newFormat;
    w.wodMovements = defs.map(m => ({ name: m.name, reps: repsFor(m, newFormat, w.volumeUsed || 1) }));
    w.movements = w.wodMovements.map(m=>m.name);
    w.wodRpe = null;
    w.wodPerformance = {};
  } else if(section==='core'){
    let choice = w.core;
    if(CORE.length>1){ do{ choice = CORE[Math.floor(Math.random()*CORE.length)]; } while(choice===w.core); }
    w.core = choice;
  }
  render();
}

function removeSection(section){
  const w = state.currentWorkout;
  if(!w) return;
  if(section==='warmup'){ w.warmup = null; w.sectionsDone.warmup = false; }
  if(section==='skill'){ w.skillTplText = null; w.skillLiftKey = null; w.suggestedLoad = null; w.deload = false; w.rpe = null; w.sectionsDone.skill = false; }
  if(section==='core'){ w.core = null; w.sectionsDone.core = false; }
  render();
}


function addWodPerformanceUI(bodyEl, w, timerSpec){
  if(!timerSpec) return;
  const perf = w.wodPerformance || (w.wodPerformance = {});
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex; gap:12px; width:100%;';

  function makeBox(labelText, inputEl){
    const box = document.createElement('div');
    box.style.cssText = 'display:flex; flex-direction:column; gap:8px; flex:1;';
    const lbl = document.createElement('div');
    lbl.textContent = labelText;
    lbl.style.cssText = 'font-size:11px; font-weight:900; color:var(--muted); text-transform:uppercase; font-family:var(--font-body);';
    box.appendChild(lbl);
    box.appendChild(inputEl);
    return box;
  }
  function makeNumberInput(value, onInput){
    const input = document.createElement('input');
    input.type='number'; input.min='0'; input.value = value ?? '';
    input.style.cssText = 'width:100%; height:40px; background:var(--surface-2); border:1px solid var(--line-strong); color:#fff; border-radius:8px; text-align:center; font-size:18px; font-weight:900; font-family:var(--font-body);';
    input.oninput = onInput;
    return input;
  }

  if(timerSpec.kind==='AMRAP'){
    const roundsInput = makeNumberInput(perf.rounds, (e)=>{ perf.rounds = e.target.value===''?null:Number(e.target.value); });
    const repsInput = makeNumberInput(perf.extraReps, (e)=>{ perf.extraReps = e.target.value===''?null:Number(e.target.value); });
    wrap.appendChild(makeBox('Rounds', roundsInput));
    wrap.appendChild(makeBox('+ Reps', repsInput));

  } else if(timerSpec.kind==='FORTIME' || timerSpec.kind==='RFT'){
    const timeInput = document.createElement('input');
    timeInput.type='text'; timeInput.placeholder='mm:ss';
    timeInput.value = perf.time || '';
    timeInput.style.cssText = 'width:100%; height:40px; background:var(--surface-2); border:1px solid var(--line-strong); color:#fff; border-radius:8px; text-align:center; font-size:18px; font-weight:900; font-family:var(--font-body);';
    timeInput.oninput = ()=>{ perf.time = timeInput.value; };
    wrap.appendChild(makeBox('Finish time', timeInput));
    if(timerSpec.cap){
      const capLabel = document.createElement('label');
      capLabel.style.cssText = 'display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:700; margin-top:auto; padding-bottom:2px;';
      const capCheckbox = document.createElement('input');
      capCheckbox.type='checkbox'; capCheckbox.checked = !!perf.hitCap;
      capCheckbox.style.cssText = 'width:16px; height:16px; accent-color:var(--coral);';
      capCheckbox.onchange = ()=>{ perf.hitCap = capCheckbox.checked; };
      capLabel.appendChild(capCheckbox);
      capLabel.append('Hit time cap');
      const capBox = document.createElement('div');
      capBox.style.cssText = 'display:flex; flex-direction:column; justify-content:flex-end; flex:1;';
      capBox.appendChild(capLabel);
      wrap.appendChild(capBox);
    }

  } else if(timerSpec.kind==='EMOM'){
    const label = document.createElement('label');
    label.style.cssText = 'display:flex; align-items:center; gap:8px; font-size:13px; color:#fff; font-weight:600;';
    const checkbox = document.createElement('input');
    checkbox.type='checkbox'; checkbox.checked = perf.completedAll !== false;
    checkbox.style.cssText = 'width:16px; height:16px; accent-color:var(--coral);';
    checkbox.onchange = ()=>{ perf.completedAll = checkbox.checked; };
    label.appendChild(checkbox);
    label.append(' Completed all rounds');
    wrap.appendChild(label);

  } else {
    return;
  }
  bodyEl.appendChild(wrap);
}

async function logWorkout(){
  const w = state.currentWorkout;
  if(!w) return;
  try{
    if(w.skillLiftKey && w.suggestedLoad){
      state.weights[w.skillLiftKey] = w.suggestedLoad;
      await saveWeights();
    }
    if(w.wodRpe && !w.isBenchmark){
      const adj = VOLUME_ADJUST[w.wodRpe] ?? 0;
      state.volume[w.type] = clamp((state.volume[w.type] || 1.0) + adj, 0.7, 1.4);
      await saveVolume();
    }
    let prMessage = null;
    if(w.isBenchmark){
      const benchmark = BENCHMARKS.find(b=>b.name===w.benchmarkName);
      const score = computeBenchmarkScore(benchmark, w.wodPerformance);
      if(benchmark && score!=null){
        const prevHist = (state.benchmarks[benchmark.name] && state.benchmarks[benchmark.name].history) || [];
        const prevBest = prevHist.length
          ? (benchmark.scoreType==='rounds' ? Math.max(...prevHist.map(h=>h.score)) : Math.min(...prevHist.map(h=>h.score)))
          : null;
        const isPR = prevBest!=null && ((benchmark.scoreType==='rounds' && score>prevBest) || (benchmark.scoreType==='time' && score<prevBest));
        state.benchmarks[benchmark.name] = state.benchmarks[benchmark.name] || {history:[]};
        state.benchmarks[benchmark.name].history.push({date: Date.now(), score});
        await saveBenchmarks();
        if(isPR) prMessage = `New best on ${benchmark.name}! ${fmtBenchmarkScore(benchmark, score)} (previous: ${fmtBenchmarkScore(benchmark, prevBest)})`;
        else if(prevBest==null) prMessage = `${benchmark.name} baseline set: ${fmtBenchmarkScore(benchmark, score)}. Next retest will compare against this.`;
      }
    }
    state.history.push({
      date: Date.now(), type: w.type, warmup: w.warmup, skillTplText: w.skillTplText,
      liftKey: w.skillLiftKey, loggedLoad: w.suggestedLoad || null, rpe: w.rpe || null,
      wodRpe: w.wodRpe || null, volumeUsed: w.volumeUsed || 1.0,
      format: w.format, movements: w.movements, movementNames: w.movements, core: w.core, bw: w.bw,
      sectionsDone: w.sectionsDone || null, wodPerformance: w.wodPerformance || null,
      isBenchmark: w.isBenchmark || false, benchmarkName: w.benchmarkName || null
    });
    await saveHistory();
    toast(prMessage || ('Logged. Next ' + DAY_TYPES.find(d=>d.key===w.type).label + ' session will build on this.'));
    state.currentWorkout = null;
    document.getElementById('gw-timebanner').style.display = 'none';
    render();
  }catch(err){
    console.error('logWorkout failed', err);
    toast('Something went wrong saving — please try again.');
  }
}

async function saveActivity(){
  const d = activityDraft;
  if(!d || !d.intensity) return;
  try{
    const activityName = d.activity==='Other' && d.custom.trim() ? d.custom.trim() : d.activity;
    const mappedType = ACTIVITY_FOCUS_MAP[d.activity] || null;
    state.history.push({
      date: Date.now(), kind:'external', activity: activityName, mappedType,
      duration: d.duration, intensity: d.intensity, notes: d.notes || ''
    });
    await saveHistory();
    toast('Activity logged.');
    activityDraft = null;
    state.showActivityForm = false;
    renderLogPage();
    if(state_page==='wod') render(); // refresh recommendation/coach notes if visible
  }catch(err){
    console.error('saveActivity failed', err);
    toast('Something went wrong saving — please try again.');
  }
}

function buildSparkline(values, w, h){
  w = w || 160; h = h || 34;
  if(values.length<2) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max-min) || 1;
  const stepX = w/(values.length-1);
  const pts = values.map((v,i)=>{
    const x = i*stepX;
    const y = h - ((v-min)/range)*h*0.85 - h*0.075;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;">
    <polyline points="${pts}" fill="none" stroke="var(--coral)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function weekStart(ts){
  const d = new Date(ts);
  const day = d.getDay();
  const diffToMonday = (day===0 ? -6 : 1-day);
  const monday = new Date(d);
  monday.setDate(d.getDate()+diffToMonday);
  monday.setHours(0,0,0,0);
  return monday.getTime();
}
function weekLabel(ts){
  const start = new Date(ts);
  const end = new Date(ts + 6*24*60*60*1000);
  const fmt = (d)=>d.toLocaleDateString(undefined,{month:'short', day:'numeric'});
  return `${fmt(start)} – ${fmt(end)}`;
}

// ---------- WORKOUT TIMER ----------
// AudioContext is created lazily on first user interaction (required by browsers)
let audioCtx = null;
function beep(freq=880, durationMs=180, delayMs=0, gainLevel=0.35){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t0 = audioCtx.currentTime + delayMs/1000;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(gainLevel, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + durationMs/1000);
    osc.start(t0); osc.stop(t0 + durationMs/1000);
  }catch(e){}
}
// short, low "tick" for the final 3 seconds of any countdown window
function tickBeep(){ beep(360, 110, 0, 0.28); }
// higher, longer "switch" beep for round/minute/phase changes
function switchBeep(){ beep(1000, 320, 0, 0.4); }
function beepTriple(){ beep(1000,180,0,0.4); beep(1000,180,220,0.4); beep(1300,420,440,0.45); }

// fires the 3-2-1 tick once per whole second during the final 3 seconds of a countdown; resets once past that window
function maybeTick(secondsRemaining){
  if(!timer || !timer.running) return;
  const whole = Math.ceil(secondsRemaining);
  if(whole>=1 && whole<=3 && whole !== timer.lastTickSecond){
    tickBeep();
    timer.lastTickSecond = whole;
  } else if(whole>3){
    timer.lastTickSecond = null;
  }
}

// Scans any section's text for a recognizable time structure. Returns null if the section isn't time-based.
function parseTimerFromText(text){
  let m;
  if(m = text.match(/AMRAP\s+(\d+)'/i)) return {kind:'AMRAP', minutes:Number(m[1])};
  if(m = text.match(/EMOM\s+(\d+)'/i)) return {kind:'EMOM', minutes:Number(m[1])};
  if(m = text.match(/Tabata\s+(\d+)"\s*\/\s*(\d+)"\s*(?:x\s*(\d+))?/i)){
    return {kind:'TABATA', workSec:Number(m[1]), restSec:Number(m[2]), rounds:Number(m[3]||8)};
  }
  if(m = text.match(/FOR TIME[\s\S]*?cap\s+(\d+)'/i)) return {kind:'FORTIME', cap:Number(m[1])};
  if(/FOR TIME/i.test(text)) return {kind:'FORTIME', cap:null};
  if(m = text.match(/(\d+)\s*RFT/i)){
    const capM = text.match(/time cap\s+(\d+)'/i);
    return {kind:'RFT', cap: capM ? Number(capM[1]) : null};
  }
  if(m = text.match(/(\d+)'\s*accumulate/i) || (m = text.match(/accumulate\s+(\d+)'/i))){
    return {kind:'COUNTDOWN', minutes:Number(m[1])};
  }
  if(m = text.match(/each\s+(\d+)\s*min/i)) return {kind:'INTERVAL', minutes:Number(m[1])};
  if(m = text.match(/rest\s+(\d+)\s*sec/i)) return {kind:'INTERVAL', minutes:Number(m[1])/60};
  return null;
}

let timer = null; // {kind, ...spec, running, startedAt, elapsedBefore, lastBeepUnit, raf}

function fmtClock(totalSeconds){
  const s = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function openTimer(spec, label, contextText){
  timer = { ...spec, running:false, startedAt:null, elapsedBefore:0, lastBeepUnit:-1, lastPhaseKey:null, lastTickSecond:null, doneBeeped:false };
  document.getElementById('gw-timer-label').textContent = label || spec.kind;
  document.getElementById('gw-timer-sub').textContent = timerSubLabel();
  const phaseEl = document.getElementById('gw-timer-phase');
  phaseEl.classList.remove('show','work','rest');
  phaseEl.textContent = '';
  const ctxBox = document.getElementById('gw-timer-context');
  if(contextText){
    document.getElementById('gw-timer-context-text').textContent = contextText;
    ctxBox.classList.add('show');
  } else {
    ctxBox.classList.remove('show');
  }
  updateTimerDisplay();
  document.getElementById('gw-timer-backdrop').classList.add('show');
}
function timerSubLabel(){
  if(!timer) return '';
  if(timer.kind==='AMRAP') return `${timer.minutes} minute AMRAP — counts down`;
  if(timer.kind==='EMOM') return `${timer.minutes} minute EMOM — beeps every minute`;
  if(timer.kind==='TABATA') return `${timer.rounds} rounds — ${timer.workSec}s work / ${timer.restSec}s rest`;
  if(timer.kind==='COUNTDOWN') return `${timer.minutes} minute countdown`;
  if(timer.kind==='INTERVAL'){
    const totalSec = Math.round(timer.minutes*60);
    const label = totalSec < 60 ? `${totalSec} sec` : `${timer.minutes} min`;
    return `Repeats every ${label} — beeps each round, stop when done`;
  }
  if(timer.kind==='FORTIME' || timer.kind==='RFT') return timer.cap ? `Counts up — time cap ${timer.cap}'` : 'Counts up — stop when you finish';
  return timer.cap ? `Counts up — time cap ${timer.cap}'` : 'Stopwatch';
}
function currentElapsed(){
  if(!timer) return 0;
  const running = timer.running ? (performance.now() - timer.startedAt)/1000 : 0;
  return timer.elapsedBefore + running;
}
function updateTimerDisplay(){
  if(!timer) return;
  const elapsed = currentElapsed();
  const clock = document.getElementById('gw-timer-clock');
  let displaySeconds, warn = false;

  if(timer.kind==='AMRAP' || timer.kind==='COUNTDOWN'){
    const total = timer.minutes*60;
    displaySeconds = total - elapsed;
    if(displaySeconds <= 0){ displaySeconds = 0; warn = true; finishIfNeeded(); }
    else { if(displaySeconds <= 10) warn = true; maybeTick(displaySeconds); }

  } else if(timer.kind==='EMOM'){
    const total = timer.minutes*60;
    const clamped = Math.min(elapsed, total);
    const unit = Math.floor(clamped/60);
    const withinMinute = clamped - unit*60;
    displaySeconds = 60 - withinMinute;
    if(displaySeconds===60) displaySeconds=0;
    document.getElementById('gw-timer-sub').textContent = `Minute ${Math.min(unit+1, timer.minutes)} of ${timer.minutes}`;
    if(unit > timer.lastBeepUnit && unit < timer.minutes && timer.running){ switchBeep(); timer.lastBeepUnit = unit; }
    if(elapsed >= total){ warn = true; finishIfNeeded(); displaySeconds = 0; }
    else { if(displaySeconds <= 3) warn = true; maybeTick(displaySeconds); }

  } else if(timer.kind==='INTERVAL'){
    const cycle = timer.minutes*60;
    const unit = Math.floor(elapsed/cycle);
    const withinUnit = elapsed - unit*cycle;
    displaySeconds = cycle - withinUnit;
    if(displaySeconds===cycle) displaySeconds=0;
    document.getElementById('gw-timer-sub').textContent = `Round ${unit+1} — beeps each time it resets`;
    if(unit > timer.lastBeepUnit && timer.running){ switchBeep(); timer.lastBeepUnit = unit; }
    if(displaySeconds <= 3) warn = true;
    maybeTick(displaySeconds);

  } else if(timer.kind==='TABATA'){
    const cycle = timer.workSec + timer.restSec;
    const totalCycles = timer.rounds;
    const clamped = Math.min(elapsed, cycle*totalCycles);
    const unit = Math.floor(clamped/cycle);
    const withinUnit = clamped - unit*cycle;
    const inWork = withinUnit < timer.workSec;
    displaySeconds = inWork ? (timer.workSec - withinUnit) : (cycle - withinUnit);
    const phaseKey = unit + (inWork ? '-work' : '-rest');
    const phaseEl = document.getElementById('gw-timer-phase');
    phaseEl.textContent = inWork ? 'WORK' : 'REST';
    phaseEl.classList.add('show');
    phaseEl.classList.toggle('work', inWork);
    phaseEl.classList.toggle('rest', !inWork);
    document.getElementById('gw-timer-sub').textContent = `Round ${Math.min(unit+1, totalCycles)} of ${totalCycles}`;
    if(phaseKey !== timer.lastPhaseKey && timer.running){ switchBeep(); timer.lastPhaseKey = phaseKey; }
    if(elapsed >= cycle*totalCycles){ warn = true; finishIfNeeded(); displaySeconds = 0; phaseEl.classList.remove('show'); }
    else { if(displaySeconds <= 3) warn = true; maybeTick(displaySeconds); }

  } else { // FORTIME / RFT / STOPWATCH
    displaySeconds = elapsed;
    if(timer.cap){
      const remaining = timer.cap*60 - elapsed;
      document.getElementById('gw-timer-sub').textContent = remaining > 0
        ? `Time cap in ${fmtClock(remaining)}` : 'Time cap reached';
      if(remaining <= 0){ warn = true; finishIfNeeded(); displaySeconds = timer.cap*60; }
      else { if(remaining <= 10) warn = true; maybeTick(remaining); }
    }
  }

  clock.textContent = fmtClock(displaySeconds);
  clock.classList.toggle('gw-warn', warn);
}
function finishIfNeeded(){
  if(timer && !timer.doneBeeped){
    timer.doneBeeped = true;
    timer.running = false;
    beepTriple();
  }
}
function timerTick(){
  if(!timer) return;
  updateTimerDisplay();
  timer.raf = requestAnimationFrame(timerTick);
}

document.getElementById('gw-timer-start').onclick = ()=>{
  if(!timer || timer.running) return;
  timer.running = true;
  timer.startedAt = performance.now();
  timer.doneBeeped = false;
  cancelAnimationFrame(timer.raf);
  timerTick();
};
document.getElementById('gw-timer-pause').onclick = ()=>{
  if(!timer || !timer.running) return;
  timer.elapsedBefore = currentElapsed();
  timer.running = false;
  cancelAnimationFrame(timer.raf);
  updateTimerDisplay();
};
document.getElementById('gw-timer-reset').onclick = ()=>{
  if(!timer) return;
  cancelAnimationFrame(timer.raf);
  timer.running = false; timer.startedAt = null; timer.elapsedBefore = 0;
  timer.lastBeepUnit = -1; timer.lastPhaseKey = null; timer.lastTickSecond = null; timer.doneBeeped = false;
  document.getElementById('gw-timer-sub').textContent = timerSubLabel();
  updateTimerDisplay();
};
document.getElementById('gw-timer-close').onclick = ()=>{
  if(timer){ cancelAnimationFrame(timer.raf); }
  document.getElementById('gw-timer-backdrop').classList.remove('show');
};

loadState();
})();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
